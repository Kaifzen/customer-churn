name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: false

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Syntax check
        run: uv run python -m compileall src scripts tests

      - name: Run unit tests
        run: uv run pytest -q

      - name: Verify Docker image builds
        run: docker build -f Dockerfile -t customer-churn-predictor:ci .

  docker-push:
    runs-on: ubuntu-latest
    needs: test-and-verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            kaifzen/ml-customer-churn:latest
            kaifzen/ml-customer-churn:${{ github.sha }}